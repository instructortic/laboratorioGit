<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="stylelogin.css">
</head>

<body>

<div class="login-header">
    <img src="images/logo.png" class="login-logo" alt="Logo">
</div>

<div class="login-container">

  
    <div class="login-form">
        <h1>Iniciar Sesión</h1>

        <input type="email" placeholder="Email">
        <input type="password" placeholder="Contraseña">

        <a href="#">¿Olvidaste tu contraseña?</a>


           <!-- Botón de Iniciar Sesión que lleva a index -->
<a href="../dashboard/dashboard.html" class="login-btn">INICIAR SESIÓN</a>


    </div>

   
    <div class="login-welcome">
        <h2>¡Bienvenido<br>de nuevo!</h2>
        <p>
            Para mantenerte conectado con nosotros,<br>
            inicia sesión con tu información personal
        </p>
    </div>

</div>

</body>
</html>
